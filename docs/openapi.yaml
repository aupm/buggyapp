openapi: 3.0.0
info:
  title: Customer API
  version: 1.0.0

paths:
  /customers:
    post:
      summary: Create customer
      requestBody:
        required: true
      responses:
        "201":
          description: Created

  /customers/{id}:
    get:
      summary: Get customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
